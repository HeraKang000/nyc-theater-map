<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Theater — Summer 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: #0a0a0a; color: #ddd; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

/* ── TOP NAV ── */
#topbar {
  height: 40px;
  display: flex;
  align-items: center;
  border-bottom: 1px solid #1a1a1a;
  background: #0a0a0a;
  padding: 0 16px;
  gap: 2px;
  flex-shrink: 0;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
}
#root {
  padding-top: 40px;
}
#topbar h1 { font-size: 11px; font-weight: 700; color: #555; letter-spacing: 0.04em; margin-right: 16px; }
.tab-btn {
  padding: 4px 12px;
  border-radius: 4px;
  border: none;
  background: none;
  color: #444;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.tab-btn:hover { color: #aaa; }
.tab-btn.active { background: #1a1a1a; color: #eee; }

/* ── LAYOUT ── */
#root { display: flex; flex-direction: column; height: 100vh; }
.view { display: none; flex: 1; overflow: hidden; }
.view.active { display: flex; }

/* ══════════════════════════════
   MAP VIEW
══════════════════════════════ */
#view-map { flex-direction: row; }

#sidebar { width: 240px; flex-shrink: 0; display: flex; flex-direction: column; border-right: 1px solid #141414; overflow: hidden; }
#sidebar-header { padding: 12px 14px; border-bottom: 1px solid #141414; }
#sidebar-header p { font-size: 9px; color: #333; margin-top: 2px; }
#sidebar-title { font-size: 11px; font-weight: 700; color: #ddd; }
#venue-list { overflow-y: auto; flex: 1; }
.venue-item { padding: 8px 14px; border-bottom: 1px solid #111; cursor: pointer; display: flex; align-items: flex-start; gap: 8px; transition: background 0.1s; }
.venue-item:hover { background: #111; }
.venue-item.selected { background: #0f1520; }
.vdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.vname { font-size: 11px; font-weight: 600; color: #ccc; margin-bottom: 1px; }
.vhood { font-size: 10px; color: #3a3a3a; }

#map { flex: 1; }

/* info card */
#card { width: 300px; flex-shrink: 0; display: none; flex-direction: column; border-left: 1px solid #141414; background: #0a0a0a; overflow-y: auto; }
#card.open { display: flex; }
#card-img-wrap { width: 100%; height: 170px; position: relative; overflow: hidden; flex-shrink: 0; background: #111; }
#card-img { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 0.3s; }
#card-img.loading { opacity: 0; }
#card-img-placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 44px; font-weight: 900; opacity: 0.35; color: #fff; }
#card-img-caption { position: absolute; bottom: 0; left: 0; right: 0; padding: 5px 8px; font-size: 9px; color: rgba(255,255,255,0.25); background: linear-gradient(transparent, rgba(0,0,0,0.5)); text-align: right; }
#card-close { position: absolute; top: 8px; right: 8px; z-index: 10; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; color: #aaa; cursor: pointer; font-size: 12px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
#card-close:hover { color: #fff; }
#card-inner { padding: 16px 18px 20px; flex: 1; }
#card-cat { display: inline-block; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; padding: 3px 7px; border-radius: 3px; margin-bottom: 10px; }
#card-name { font-size: 16px; font-weight: 700; color: #eee; line-height: 1.25; margin-bottom: 4px; }
#card-hood { font-size: 11px; color: #444; margin-bottom: 12px; }
#card-notes { font-size: 12px; color: #888; line-height: 1.7; margin-bottom: 16px; }
#card-link { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; color: #7c6fe0; text-decoration: none; padding: 7px 12px; border: 1px solid #2d1b69; border-radius: 4px; }
#card-link:hover { background: #2d1b69; color: #c4b5fd; }
#card-legend { padding: 0 18px 18px; border-top: 1px solid #111; padding-top: 14px; }
#card-legend h4 { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: #2a2a2a; margin-bottom: 8px; }
.legend-item { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
.legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.legend-label { font-size: 10px; color: #3a3a3a; }

/* ══════════════════════════════
   CALENDAR VIEW
══════════════════════════════ */
#view-calendar { flex-direction: row; overflow: hidden; }

#cal-sidebar {
  width: 220px;
  flex-shrink: 0;
  border-right: 1px solid #141414;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#cal-month-nav {
  padding: 14px 14px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #141414;
}
#cal-month-nav h2 { font-size: 12px; font-weight: 700; color: #ddd; }
.month-btn { background: none; border: none; color: #444; cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 3px; }
.month-btn:hover { color: #eee; background: #1a1a1a; }
#cal-mini { padding: 10px 12px; border-bottom: 1px solid #141414; }
.mini-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.mini-dow { font-size: 8px; color: #333; text-align: center; padding: 2px 0; font-weight: 600; }
.mini-day {
  font-size: 9px;
  color: #444;
  text-align: center;
  padding: 3px 2px;
  border-radius: 3px;
  cursor: pointer;
  position: relative;
  transition: background 0.1s;
}
.mini-day:hover { background: #1a1a1a; color: #aaa; }
.mini-day.today { background: #1a1a2a; color: #7c6fe0; font-weight: 700; }
.mini-day.selected { background: #2d1b69; color: #c4b5fd; }
.mini-day.has-event::after { content: ''; position: absolute; bottom: 1px; left: 50%; transform: translateX(-50%); width: 3px; height: 3px; border-radius: 50%; background: #7c3aed; }
.mini-day.empty { cursor: default; }

#cal-filter { padding: 10px 12px; overflow-y: auto; flex: 1; }
#cal-filter h4 { font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: #2a2a2a; margin-bottom: 8px; }
.filter-item { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; cursor: pointer; }
.filter-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; transition: opacity 0.15s; }
.filter-label { font-size: 10px; color: #555; }
.filter-item.off .filter-dot { opacity: 0.2; }
.filter-item.off .filter-label { color: #2a2a2a; }

#cal-main { flex: 1; overflow-y: auto; padding: 0; display: flex; flex-direction: column; }
#cal-date-header { padding: 14px 20px 10px; border-bottom: 1px solid #141414; flex-shrink: 0; }
#cal-date-header h3 { font-size: 12px; font-weight: 700; color: #aaa; }
#cal-event-list { flex: 1; overflow-y: auto; }

.cal-day-group { border-bottom: 1px solid #111; }
.cal-day-label {
  padding: 10px 20px 6px;
  font-size: 10px;
  font-weight: 700;
  color: #333;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  position: sticky;
  top: 0;
  background: #0a0a0a;
  z-index: 1;
}
.cal-day-label.is-today { color: #7c3aed; }
.cal-event-row {
  padding: 8px 20px 8px 20px;
  display: flex;
  gap: 10px;
  cursor: pointer;
  border-top: 1px solid #0f0f0f;
  transition: background 0.1s;
}
.cal-event-row:hover { background: #111; }
.cal-event-bar { width: 3px; border-radius: 2px; flex-shrink: 0; align-self: stretch; min-height: 20px; }
.cal-event-info { flex: 1; }
.cal-event-title { font-size: 12px; font-weight: 600; color: #ccc; margin-bottom: 2px; }
.cal-event-venue { font-size: 10px; color: #3a3a3a; margin-bottom: 2px; }
.cal-event-dates { font-size: 9px; color: #2a2a2a; }
.cal-event-tag { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 1px 5px; border-radius: 2px; margin-left: auto; align-self: flex-start; flex-shrink: 0; }
.cal-empty { padding: 40px 20px; color: #2a2a2a; font-size: 12px; text-align: center; }

#cal-detail {
  width: 280px;
  flex-shrink: 0;
  border-left: 1px solid #141414;
  background: #0a0a0a;
  display: none;
  flex-direction: column;
  overflow-y: auto;
}
#cal-detail.open { display: flex; }
#cal-detail-img { width: 100%; height: 150px; position: relative; overflow: hidden; flex-shrink: 0; background: #111; }
#cal-detail-img img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.3s; }
#cal-detail-img img.loading { opacity: 0; }
#cal-detail-img-ph { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 900; opacity: 0.35; color: #fff; }
#cal-detail-img-cap { position: absolute; bottom: 0; right: 0; padding: 4px 8px; font-size: 9px; color: rgba(255,255,255,0.2); }
#cal-detail-close { position: absolute; top: 8px; right: 8px; z-index: 10; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; color: #aaa; cursor: pointer; font-size: 12px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
#cal-detail-close:hover { color: #fff; }
#cal-detail-body { padding: 16px 18px 20px; }
#cal-detail-tag { display: inline-block; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; padding: 3px 7px; border-radius: 3px; margin-bottom: 10px; }
#cal-detail-title { font-size: 16px; font-weight: 700; color: #eee; line-height: 1.25; margin-bottom: 4px; }
#cal-detail-artist { font-size: 11px; color: #555; margin-bottom: 10px; }
#cal-detail-dates { font-size: 11px; color: #444; margin-bottom: 12px; }
#cal-detail-notes { font-size: 12px; color: #777; line-height: 1.7; margin-bottom: 16px; }
#cal-detail-link { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; color: #7c6fe0; text-decoration: none; padding: 7px 12px; border: 1px solid #2d1b69; border-radius: 4px; }
#cal-detail-link:hover { background: #2d1b69; color: #c4b5fd; }

/* Leaflet overrides */
.leaflet-popup-content-wrapper { background: #111; border: 1px solid #222; border-radius: 8px; box-shadow: 0 4px 24px rgba(0,0,0,0.7); }
.leaflet-popup-content { color: #eee; font-family: -apple-system, sans-serif; font-size: 12px; margin: 12px 14px; min-width: 150px; }
.leaflet-popup-content h3 { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
.leaflet-popup-content .hood { font-size: 10px; color: #555; margin-bottom: 5px; }
.leaflet-popup-tip-container { display: none; }
.leaflet-popup-close-button { color: #444 !important; }
.cat-pill { display: inline-block; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 2px 6px; border-radius: 3px; }

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 2px; }

/* ── OVERLAY ── */
#overlay {
  display: none;
  position: fixed;
  inset: 40px 0 0 0;
  background: rgba(0,0,0,0.55);
  z-index: 490;
}
#overlay.show { display: block; }

/* ── MENU BUTTON (mobile only) ── */
#menu-btn {
  display: none;
  margin-left: auto;
  background: none;
  border: none;
  color: #555;
  font-size: 16px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
}
#menu-btn:hover { color: #eee; }

/* ══════════════════════════════
   MOBILE  (≤ 768px)
══════════════════════════════ */
@media (max-width: 768px) {

  #menu-btn { display: block; }
  #topbar h1 { font-size: 10px; }

  /* --- MAP VIEW --- */

  /* Sidebar becomes a left drawer */
  #sidebar {
    position: fixed;
    top: 40px; left: 0; bottom: 0;
    z-index: 500;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    width: 72vw;
    max-width: 300px;
    border-right: 1px solid #222;
  }
  #sidebar.drawer-open {
    transform: translateX(0);
    box-shadow: 6px 0 24px rgba(0,0,0,0.6);
  }

  /* Map fills the screen */
  #view-map { position: relative; }
  #map { width: 100%; }

  /* Info card — fixed bottom sheet, no scroll */
  #card {
    position: fixed !important;
    bottom: 0; left: 0; right: 0;
    width: 100% !important;
    height: 62vh;
    max-height: none;
    border-left: none !important;
    border-top: 1px solid #222;
    display: flex !important;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    z-index: 510;
    border-radius: 14px 14px 0 0;
    overflow: hidden;
  }
  #card.open { transform: translateY(0); }
  #card-img-wrap { height: 160px; flex-shrink: 0; border-radius: 14px 14px 0 0; }
  #card-inner { flex: 1; overflow: hidden; padding: 14px 18px 16px; }
  #card-notes {
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 14px;
  }
  #card-legend { display: none; }

  /* --- CALENDAR VIEW --- */

  /* Cal sidebar becomes left drawer */
  #cal-sidebar {
    position: fixed;
    top: 40px; left: 0; bottom: 0;
    z-index: 500;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    width: 72vw;
    max-width: 280px;
    border-right: 1px solid #222;
    background: #0a0a0a;
  }
  #cal-sidebar.drawer-open {
    transform: translateX(0);
    box-shadow: 6px 0 24px rgba(0,0,0,0.6);
  }

  /* Cal main fills the screen */
  #cal-main { width: 100%; }

  /* Cal detail — fixed bottom sheet, no scroll */
  #cal-detail {
    position: fixed !important;
    bottom: 0; left: 0; right: 0;
    width: 100% !important;
    height: 62vh;
    max-height: none;
    border-left: none !important;
    border-top: 1px solid #222;
    display: flex !important;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    z-index: 510;
    border-radius: 14px 14px 0 0;
    overflow: hidden;
  }
  #cal-detail.open { transform: translateY(0); }
  #cal-detail-img { height: 160px; flex-shrink: 0; border-radius: 14px 14px 0 0; }
  #cal-detail-body { flex: 1; overflow: hidden; padding: 14px 18px 16px; }
  #cal-detail-notes {
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 14px;
  }

  /* map filter button in calendar topbar */
  #cal-date-header { display: flex; align-items: center; justify-content: space-between; }
  #cal-filter-btn {
    display: flex;
    font-size: 10px;
    font-weight: 600;
    color: #555;
    background: #111;
    border: 1px solid #1a1a1a;
    border-radius: 4px;
    padding: 4px 10px;
    cursor: pointer;
  }
  #cal-filter-btn:hover { color: #eee; }
}

@media (min-width: 769px) {
  #cal-filter-btn { display: none; }
}
</style>
</head>
<body>
<div id="root">

<!-- TOP NAV -->
<div id="topbar">
  <h1>NYC THEATER · SUMMER 2026</h1>
  <button class="tab-btn active" id="tab-map" onclick="showView('map')">Map</button>
  <button class="tab-btn" id="tab-calendar" onclick="showView('calendar')">Calendar</button>
  <button id="menu-btn" onclick="toggleDrawer()">☰</button>
</div>

<!-- Mobile overlay -->
<div id="overlay" onclick="closeOverlay()"></div>

<!-- ══ MAP VIEW ══ -->
<div class="view active" id="view-map">
  <div id="sidebar">
    <div id="sidebar-header">
      <div id="sidebar-title">Venues</div>
      <p>Summer 2026 · Research</p>
    </div>
    <div id="venue-list"></div>
  </div>
  <div id="map"></div>
  <div id="card">
    <div id="card-img-wrap">
      <button id="card-close" onclick="closeCard()">✕</button>
      <div id="card-img-placeholder"></div>
      <img id="card-img" class="loading" src="" alt="" />
      <div id="card-img-caption"></div>
    </div>
    <div id="card-inner">
      <div id="card-cat"></div>
      <div id="card-name"></div>
      <div id="card-hood"></div>
      <div id="card-notes"></div>
      <a id="card-link" href="#" target="_blank">↗ Visit Website</a>
    </div>
    <div id="card-legend">
      <h4>Legend</h4>
      <div class="legend-item"><div class="legend-dot" style="background:#7c3aed"></div><div class="legend-label">Experimental Theater</div></div>
      <div class="legend-item"><div class="legend-dot" style="background:#e11d48"></div><div class="legend-label">Performance Art</div></div>
      <div class="legend-item"><div class="legend-dot" style="background:#059669"></div><div class="legend-label">Film</div></div>
      <div class="legend-item"><div class="legend-dot" style="background:#c2410c"></div><div class="legend-label">Opera / Classical</div></div>
      <div class="legend-item"><div class="legend-dot" style="background:#0891b2"></div><div class="legend-label">Broadway / Major Stage</div></div>
      <div class="legend-item"><div class="legend-dot" style="background:#a855f7"></div><div class="legend-label">Visual Art / Installation</div></div>
      <div class="legend-item"><div class="legend-dot" style="background:#d97706"></div><div class="legend-label">Music / Performance</div></div>
      <div class="legend-item"><div class="legend-dot" style="background:#6b7280"></div><div class="legend-label">Archive / Library</div></div>
    </div>
  </div>
</div>

<!-- ══ CALENDAR VIEW ══ -->
<div class="view" id="view-calendar">

  <!-- Left: mini calendar + filters -->
  <div id="cal-sidebar">
    <div id="cal-month-nav">
      <button class="month-btn" onclick="changeMonth(-1)">‹</button>
      <h2 id="cal-month-label"></h2>
      <button class="month-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div id="cal-mini">
      <div class="mini-grid" id="cal-mini-grid"></div>
    </div>
    <div id="cal-filter">
      <h4>Filter by type</h4>
      <div id="filter-list"></div>
    </div>
  </div>

  <!-- Center: event list -->
  <div id="cal-main">
    <div id="cal-date-header">
      <h3 id="cal-list-label"></h3>
      <button id="cal-filter-btn" onclick="toggleDrawer()">≡ Filter</button>
    </div>
    <div id="cal-event-list"></div>
  </div>

  <!-- Right: event detail -->
  <div id="cal-detail">
    <div id="cal-detail-img">
      <button id="cal-detail-close" onclick="closeDetail()">✕</button>
      <div id="cal-detail-img-ph"></div>
      <img id="cal-detail-img-el" class="loading" src="" alt="" />
      <div id="cal-detail-img-cap"></div>
    </div>
    <div id="cal-detail-body">
      <div id="cal-detail-tag"></div>
      <div id="cal-detail-title"></div>
      <div id="cal-detail-artist"></div>
      <div id="cal-detail-dates"></div>
      <div id="cal-detail-notes"></div>
      <a id="cal-detail-link" href="#" target="_blank">↗ Visit Website</a>
    </div>
  </div>
</div>

</div><!-- #root -->

<script>
// ══════════════════════════════════════════════════
//  SHARED DATA
// ══════════════════════════════════════════════════

const colors = {
  theater: "#7c3aed", broadway: "#0891b2", perf: "#e11d48",
  visual: "#a855f7", film: "#059669", opera: "#c2410c",
  music: "#d97706", archive: "#6b7280",
};
const catName = {
  theater: "Experimental Theater", broadway: "Broadway / Major Stage",
  perf: "Performance Art", visual: "Visual Art / Installation",
  film: "Film", opera: "Opera / Classical",
  music: "Music / Performance", archive: "Archive / Library",
};
const pillBg = {
  theater: "#2d1b69", broadway: "#0c2a33", perf: "#3b0016",
  visual: "#3b1d6e", film: "#052e16", opera: "#3b1005",
  music: "#2d1900", archive: "#1a1a1a"
};
const pillFg = {
  theater: "#c4b5fd", broadway: "#67e8f9", perf: "#fda4af",
  visual: "#d8b4fe", film: "#86efac", opera: "#fb923c",
  music: "#fdba74", archive: "#a1a1aa"
};
const gradients = {
  theater: "linear-gradient(135deg, #3b1f7a 0%, #6d28d9 50%, #4c1d95 100%)",
  broadway: "linear-gradient(135deg, #0e4a5c 0%, #0891b2 50%, #0c3a47 100%)",
  perf: "linear-gradient(135deg, #6b0022 0%, #e11d48 50%, #9f1239 100%)",
  visual: "linear-gradient(135deg, #4a1a7a 0%, #a855f7 50%, #7e22ce 100%)",
  film: "linear-gradient(135deg, #064e28 0%, #059669 50%, #047857 100%)",
  opera: "linear-gradient(135deg, #7c2600 0%, #c2410c 50%, #9a3412 100%)",
  music: "linear-gradient(135deg, #78350f 0%, #d97706 50%, #b45309 100%)",
  archive: "linear-gradient(135deg, #1f2937 0%, #374151 50%, #111827 100%)",
};

  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'map') { setTimeout(() => map.invalidateSize(), 50); }
  if (name === 'calendar') { renderCalendar(); }
}

const SV_KEY = 'AIzaSyCIpgTbmatAn_hEDmXh7aSblLpPgnZiwsg';
const wikiCache = {};

async function fetchWikiImage(title) {
  if (!title) return null;
  if (wikiCache[title] !== undefined) return wikiCache[title];
  try {
    const url = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=pageimages&format=json&pithumbsize=640&origin=*`;
    const data = await (await fetch(url)).json();
    const page = Object.values(data.query.pages)[0];
    return (wikiCache[title] = page?.thumbnail?.source || null);
  } catch { return (wikiCache[title] = null); }
}

function svUrl(lat, lng) {
  return `https://maps.googleapis.com/maps/api/streetview?size=640x360&location=${lat},${lng}&fov=80&pitch=10&key=${SV_KEY}`;
}

function initials(name) {
  return name.split(/\s+/).filter(w => /^[A-Z]/.test(w)).slice(0, 2).map(w => w[0]).join('');
}

async function loadVenueImage(imgEl, phEl, capEl, wrapEl, wiki, lat, lng, cat) {
  wrapEl.style.background = gradients[cat] || gradients.theater;
  phEl.textContent = '';
  imgEl.classList.add('loading');
  imgEl.src = '';
  capEl.textContent = '';

  function tryLoad(src, caption) {
    return new Promise(resolve => {
      imgEl.onload  = () => { imgEl.classList.remove('loading'); capEl.textContent = caption; phEl.textContent = ''; resolve(true); };
      imgEl.onerror = () => resolve(false);
      imgEl.src = src;
    });
  }
  const ws = await fetchWikiImage(wiki);
  if (ws && await tryLoad(ws, '© Wikipedia / CC')) return;
  if (lat && lng) await tryLoad(svUrl(lat, lng), '© Google Street View');
}

  });
  const m = L.marker([v.lat, v.lng], { icon }).addTo(map)
    .bindPopup(`<h3>${v.name}</h3><div class="hood">${v.hood} · ${v.address}</div><span class="cat-pill" style="background:${pillBg[v.cat]};color:${pillFg[v.cat]}">${catName[v.cat]}</span>`, { maxWidth: 220 });
  m.on('click', () => {
    document.querySelectorAll('.venue-item').forEach(e => e.classList.remove('selected'));
    const el2 = document.getElementById(`vi-${i}`);
    if (el2) { el2.classList.add('selected'); el2.scrollIntoView({ block: 'nearest' }); }
    openCard(v);
  });
  markerRefs.push(m);
});

async function openCard(v) {
  document.getElementById('card-cat').textContent = catName[v.cat];
  document.getElementById('card-cat').style.cssText = `background:${pillBg[v.cat]};color:${pillFg[v.cat]}`;
  document.getElementById('card-name').textContent = v.name;
  document.getElementById('card-hood').textContent = v.hood + ' · ' + v.address;
  document.getElementById('card-notes').textContent = v.notes;
  document.getElementById('card-link').href = 'https://' + v.url;
  document.getElementById('card-img-placeholder').textContent = initials(v.name);
  document.getElementById('card').classList.add('open');
  if (isMobile()) {
    document.getElementById('sidebar').classList.remove('drawer-open');
    document.getElementById('overlay').classList.remove('show');
    map.dragging.disable();
    map.touchZoom.disable();
    map.scrollWheelZoom.disable();
  }

  await loadVenueImage(
    document.getElementById('card-img'),
    document.getElementById('card-img-placeholder'),
    document.getElementById('card-img-caption'),
    document.getElementById('card-img-wrap'),
    v.wiki, v.lat, v.lng, v.cat
  );
}

function closeCard() {
  document.getElementById('card').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  if (isMobile()) {
    map.dragging.enable();
    map.touchZoom.enable();
    map.scrollWheelZoom.enable();
  }
}

// ══════════════════════════════════════════════════
//  CALENDAR VIEW
// ══════════════════════════════════════════════════
let calYear = 2026, calMonth = 6; // 0-indexed: 6=July
const activeFilters = new Set(Object.keys(colors));

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderCalendar();
}

function renderCalendar() {
  renderMiniCal();
  renderEventList();
  buildFilters();
}

function dateStr(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function parseDate(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function fmtDate(s) {
  return parseDate(s).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function fmtMonth(y, m) {
  return new Date(y, m, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}

function eventsActiveOnDate(dateS) {
  return events.filter(e => {
    return e.start <= dateS && dateS <= e.end && activeFilters.has(e.cat);
  });
}

function renderMiniCal() {
  document.getElementById('cal-month-label').textContent = fmtMonth(calYear, calMonth);
  const grid = document.getElementById('cal-mini-grid');
  grid.innerHTML = '';
  const dows = ['S','M','T','W','T','F','S'];
  dows.forEach(d => { const el = document.createElement('div'); el.className = 'mini-dow'; el.textContent = d; grid.appendChild(el); });

  const firstDow = new Date(calYear, calMonth, 1).getDay();
  const lastDay  = new Date(calYear, calMonth + 1, 0).getDate();
  const todayS   = new Date().toISOString().slice(0, 10);

  for (let i = 0; i < firstDow; i++) {
    const el = document.createElement('div'); el.className = 'mini-day empty'; grid.appendChild(el);
  }
  for (let d = 1; d <= lastDay; d++) {
    const ds = dateStr(calYear, calMonth, d);
    const el = document.createElement('div');
    el.className = 'mini-day';
    el.textContent = d;
    if (ds === todayS) el.classList.add('today');
    if (eventsActiveOnDate(ds).length) el.classList.add('has-event');
    el.onclick = () => scrollToDate(ds);
    grid.appendChild(el);
  }
}

function buildFilters() {
  const fl = document.getElementById('filter-list');
  if (fl.children.length) return; // already built
  Object.entries(catName).forEach(([cat, label]) => {
    const el = document.createElement('div');
    el.className = 'filter-item';
    el.dataset.cat = cat;
    el.innerHTML = `<div class="filter-dot" style="background:${colors[cat]}"></div><div class="filter-label">${label}</div>`;
    el.onclick = () => {
      if (activeFilters.has(cat)) { activeFilters.delete(cat); el.classList.add('off'); }
      else { activeFilters.add(cat); el.classList.remove('off'); }
      renderEventList();
      renderMiniCal();
    };
    fl.appendChild(el);
  });
}

function renderEventList() {
  const label = document.getElementById('cal-list-label');
  label.textContent = fmtMonth(calYear, calMonth);

  const container = document.getElementById('cal-event-list');
  container.innerHTML = '';

  const lastDay = new Date(calYear, calMonth + 1, 0).getDate();
  const todayS  = new Date().toISOString().slice(0, 10);
  let hasAny = false;

  // Group events by day: only show event on its START date (if within this month),
  // or on the 1st of month if it started earlier but is still running.
  const byDay = {};

  events.forEach(ev => {
    if (!activeFilters.has(ev.cat)) return;
    const evStart = parseDate(ev.start);
    const evEnd   = parseDate(ev.end);
    const monthStart = new Date(calYear, calMonth, 1);
    const monthEnd   = new Date(calYear, calMonth, lastDay);
    if (evStart > monthEnd || evEnd < monthStart) return; // not in this month

    // show on: max(ev.start, month start)
    const showDate = evStart >= monthStart ? ev.start : dateStr(calYear, calMonth, 1);
    if (!byDay[showDate]) byDay[showDate] = [];
    byDay[showDate].push(ev);
  });

  const sortedDays = Object.keys(byDay).sort();
  sortedDays.forEach(ds => {
    hasAny = true;
    const d = parseDate(ds);
    const isToday = ds === todayS;

    const dayGroup = document.createElement('div');
    dayGroup.className = 'cal-day-group';
    dayGroup.id = 'day-' + ds;

    const dayLabel = document.createElement('div');
    dayLabel.className = 'cal-day-label' + (isToday ? ' is-today' : '');
    dayLabel.textContent = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase() + (isToday ? ' · TODAY' : '');
    dayGroup.appendChild(dayLabel);

    byDay[ds].forEach(ev => {
      const row = document.createElement('div');
      row.className = 'cal-event-row';
      row.innerHTML = `
        <div class="cal-event-bar" style="background:${colors[ev.cat]}"></div>
        <div class="cal-event-info">
          <div class="cal-event-title">${ev.title}</div>
          ${ev.artist ? `<div class="cal-event-venue">${ev.artist}</div>` : ''}
          <div class="cal-event-dates">${ev.venue} · ${fmtDate(ev.start)} – ${fmtDate(ev.end)}</div>
        </div>
        <div class="cal-event-tag" style="background:${pillBg[ev.cat]};color:${pillFg[ev.cat]}">${catName[ev.cat].split(' ')[0]}</div>
      `;
      row.onclick = () => openDetail(ev);
      dayGroup.appendChild(row);
    });

    container.appendChild(dayGroup);
  });

  if (!hasAny) {
    const empty = document.createElement('div');
    empty.className = 'cal-empty';
    empty.textContent = 'No events this month.';
    container.appendChild(empty);
  }
}

function scrollToDate(ds) {
  const el = document.getElementById('day-' + ds);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  // highlight selected day
  document.querySelectorAll('.mini-day.selected').forEach(e => e.classList.remove('selected'));
}

async function openDetail(ev) {
  const venueObj = venues.find(v => v.name === ev.venue);

  document.getElementById('cal-detail-tag').textContent = catName[ev.cat];
  document.getElementById('cal-detail-tag').style.cssText = `background:${pillBg[ev.cat]};color:${pillFg[ev.cat]}`;
  document.getElementById('cal-detail-title').textContent = ev.title;
  document.getElementById('cal-detail-artist').textContent = ev.artist || '';
  document.getElementById('cal-detail-dates').textContent = `${fmtDate(ev.start)} – ${fmtDate(ev.end)} · ${ev.venue}`;
  document.getElementById('cal-detail-notes').textContent = ev.notes;
  document.getElementById('cal-detail-link').href = 'https://' + ev.url;
  document.getElementById('cal-detail-img-ph').textContent = initials(ev.title);
  document.getElementById('cal-detail').classList.add('open');
  if (isMobile()) document.getElementById('overlay').classList.remove('show');

  await loadVenueImage(
    document.getElementById('cal-detail-img-el'),
    document.getElementById('cal-detail-img-ph'),
    document.getElementById('cal-detail-img-cap'),
    document.getElementById('cal-detail-img'),
    ev.wiki,
    venueObj?.lat, venueObj?.lng,
    ev.cat
  );
}

function closeDetail() {
  document.getElementById('cal-detail').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// ── Mobile drawer / overlay ──
function isMobile() { return window.innerWidth <= 768; }

function toggleDrawer() {
  if (!isMobile()) return;
  const view = document.querySelector('.view.active').id;
  const sidebar = view === 'view-map' ? document.getElementById('sidebar') : document.getElementById('cal-sidebar');
  const overlay = document.getElementById('overlay');
  const isOpen = sidebar.classList.contains('drawer-open');
  if (isOpen) {
    sidebar.classList.remove('drawer-open');
    overlay.classList.remove('show');
  } else {
    sidebar.classList.add('drawer-open');
    overlay.classList.add('show');
  }
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('sidebar').classList.remove('drawer-open');
  document.getElementById('cal-sidebar').classList.remove('drawer-open');
  document.getElementById('card').classList.remove('open');
  document.getElementById('cal-detail').classList.remove('open');
}

// Close bottom sheets when tapping overlay
document.getElementById('overlay').addEventListener('click', closeOverlay);

// init calendar
renderCalendar();
</script>
