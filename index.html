<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Theater — Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: #0e0e0e; }
body { display: flex; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

/* SIDEBAR */
#sidebar { width: 260px; flex-shrink: 0; display: flex; flex-direction: column; border-right: 1px solid #1a1a1a; overflow: hidden; }
#sidebar-header { padding: 14px 16px; border-bottom: 1px solid #1a1a1a; }
#sidebar-header h1 { font-size: 12px; font-weight: 700; color: #eee; letter-spacing: -0.01em; margin-bottom: 2px; }
#sidebar-header p { font-size: 10px; color: #444; }
#venue-list { overflow-y: auto; flex: 1; }
.venue-item { padding: 9px 16px; border-bottom: 1px solid #141414; cursor: pointer; display: flex; align-items: flex-start; gap: 8px; transition: background 0.1s; }
.venue-item:hover { background: #141414; }
.venue-item.selected { background: #111827; }
.vdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.vname { font-size: 11px; font-weight: 600; color: #ddd; margin-bottom: 1px; }
.vhood { font-size: 10px; color: #444; }

/* MAP */
#map { flex: 1; }

/* INFO CARD */
#card { width: 320px; flex-shrink: 0; display: none; flex-direction: column; border-left: 1px solid #1a1a1a; background: #0a0a0a; overflow-y: auto; }
#card.open { display: flex; }
#card-close { position: absolute; top: 10px; right: 12px; background: none; border: none; color: #444; cursor: pointer; font-size: 16px; }
#card-close:hover { color: #eee; }
#card-inner { padding: 24px 20px; flex: 1; position: relative; }
#card-cat { display: inline-block; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; padding: 3px 8px; border-radius: 3px; margin-bottom: 14px; }
#card-name { font-size: 18px; font-weight: 700; color: #eee; line-height: 1.25; margin-bottom: 6px; }
#card-hood { font-size: 11px; color: #555; margin-bottom: 16px; }
#card-notes { font-size: 12px; color: #999; line-height: 1.7; margin-bottom: 20px; }
#card-link { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; color: #7c6fe0; text-decoration: none; padding: 8px 14px; border: 1px solid #2d1b69; border-radius: 5px; transition: all 0.15s; }
#card-link:hover { background: #2d1b69; color: #c4b5fd; }
#card-divider { height: 1px; background: #1a1a1a; margin: 20px 0; }
#card-legend { padding: 0 20px 20px; }
#card-legend h4 { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: #333; margin-bottom: 10px; }
.legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.legend-label { font-size: 10px; color: #555; }

/* MAP POPUPS */
.leaflet-popup-content-wrapper { background: #111; border: 1px solid #2a2a2a; border-radius: 8px; box-shadow: 0 4px 24px rgba(0,0,0,0.7); }
.leaflet-popup-content { color: #eee; font-family: -apple-system, sans-serif; font-size: 12px; margin: 12px 14px; min-width: 160px; }
.leaflet-popup-content h3 { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
.leaflet-popup-content .hood { font-size: 10px; color: #555; margin-bottom: 5px; }
.leaflet-popup-tip-container { display: none; }
.leaflet-popup-close-button { color: #444 !important; }
.cat-pill { display: inline-block; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 2px 6px; border-radius: 3px; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>NYC Theater &amp; Film</h1>
    <p>Summer 2026 · Research</p>
  </div>
  <div id="venue-list"></div>
</div>

<div id="map"></div>

<div id="card">
  <div id="card-inner">
    <button id="card-close" onclick="closeCard()">✕</button>
    <div id="card-cat"></div>
    <div id="card-name"></div>
    <div id="card-hood"></div>
    <div id="card-notes"></div>
    <a id="card-link" href="#" target="_blank">↗ Visit Website</a>
  </div>
  <div id="card-divider"></div>
  <div id="card-legend">
    <h4>Legend</h4>
    <div class="legend-item"><div class="legend-dot" style="background:#7c3aed"></div><div class="legend-label">Experimental Theater</div></div>
    <div class="legend-item"><div class="legend-dot" style="background:#e11d48"></div><div class="legend-label">Performance Art</div></div>
    <div class="legend-item"><div class="legend-dot" style="background:#059669"></div><div class="legend-label">Film</div></div>
    <div class="legend-item"><div class="legend-dot" style="background:#c2410c"></div><div class="legend-label">Opera / Classical</div></div>
    <div class="legend-item"><div class="legend-dot" style="background:#0891b2"></div><div class="legend-label">Broadway / Major Stage</div></div>
    <div class="legend-item"><div class="legend-dot" style="background:#7c3aed" style="opacity:0.5"></div><div class="legend-label">Visual Art / Installation</div></div>
    <div class="legend-item"><div class="legend-dot" style="background:#d97706"></div><div class="legend-label">Music / Performance</div></div>
    <div class="legend-item"><div class="legend-dot" style="background:#6b7280"></div><div class="legend-label">Archive / Library</div></div>
  </div>
</div>

<script>
const map = L.map('map', { center: [40.730, -73.984], zoom: 13 });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap, © CARTO', maxZoom: 19
}).addTo(map);

const venues = [
  // Experimental Theater
  { name: "Performance Space New York", hood: "East Village", cat: "theater", lat: 40.7264, lng: -73.9816, address: "150 First Ave", url: "performancespacenewyork.org", notes: "Center of gravity for avant-garde performance in NYC. Summer 2026 residencies: Holland Andrews + yuniya edi kwon. Works-in-progress, radical interdisciplinary work." },
  { name: "La MaMa Experimental Theatre Club", hood: "East Village", cat: "theater", lat: 40.7261, lng: -73.9892, address: "66–74 E 4th St", url: "lamama.org", notes: "Founded by Ellen Stewart 1961. Original incubator of American avant-garde. Multiple stages and a global network. Fall season announcements drop in August." },
  { name: "The Performing Garage (Wooster Group)", hood: "SoHo", cat: "theater", lat: 40.7234, lng: -74.0030, address: "33 Wooster St", url: "thewoostergroup.org", notes: "Wooster Group home since 1975. Elizabeth LeCompte, Spalding Gray. The room where Rumstick Road was performed. Open rehearsals and labs occasionally." },
  { name: "The Brick Theater", hood: "Williamsburg", cat: "theater", lat: 40.7138, lng: -73.9513, address: "579 Metropolitan Ave", url: "bricktheater.com", notes: "Brooklyn's main incubator for innovative and experimental theater. Close to work base — check their calendar regularly." },
  { name: "Mabou Mines", hood: "East Village", cat: "theater", lat: 40.7268, lng: -73.9810, address: "150 First Ave", url: "maboumines.org", notes: "Lee Breuer's company — third pillar of Theater of Images alongside Wilson and Foreman. Puppetry, animation, and live performance fused." },
  { name: "Park Avenue Armory", hood: "Upper East Side", cat: "theater", lat: 40.7637, lng: -73.9642, address: "643 Park Ave", url: "armoryonpark.org", notes: "Massive 55,000 sq ft drill hall for large-scale immersive and experimental work. Robert Wilson, Kara Walker, Marina Abramovic have all shown here. The space demands architectural thinking." },
  { name: "BAM (Brooklyn Academy of Music)", hood: "Fort Greene", cat: "theater", lat: 40.6858, lng: -73.9774, address: "30 Lafayette Ave", url: "bam.org", notes: "NYC's premier presenter of international avant-garde. Pina Bausch, Wilson, van Hove, Lepage, Complicité — all showed at BAM. BAMnext Wave festival (fall) is essential." },
  { name: "St. Ann's Warehouse", hood: "DUMBO", cat: "theater", lat: 40.7033, lng: -73.9897, address: "45 Water St", url: "stannswarehouse.org", notes: "Brooklyn's key importer of international experimental theater. Complicité, Kneehigh, major UK and European work. Industrial space under the Manhattan Bridge — the space itself is part of the work." },
  { name: "HERE Arts Center", hood: "SoHo", cat: "theater", lat: 40.7249, lng: -74.0043, address: "145 Sixth Ave", url: "here.org", notes: "Interdisciplinary performance space. Home of PROTOTYPE Festival (opera-theater). Annie Dorsen, Taylor Mac, and other artists working at the intersection of theater, music, and technology." },
  { name: "The Public Theater", hood: "NoHo", cat: "theater", lat: 40.7295, lng: -73.9903, address: "425 Lafayette St", url: "publictheater.org", notes: "Joe Papp's theater — the essential bridge between experimental and mainstream American theater. Shakespeare in the Park, new American plays, and adventurous programming. Where Hamilton started." },

  // Broadway / Major Stage
  { name: "The Shed", hood: "Hudson Yards", cat: "broadway", lat: 40.7540, lng: -74.0019, address: "545 W 30th St", url: "theshed.org", notes: "NYC's newest major cultural venue — purpose-built for artists working at the intersection of performing arts, visual art, and technology. A retractable outer shell transforms the space. The most technically advanced venue in the city for projection and large-scale installation work." },
  { name: "Lincoln Center Theater", hood: "Upper West Side", cat: "broadway", lat: 40.7725, lng: -73.9832, address: "150 W 65th St", url: "lct.org", notes: "Vivian Beaumont (large) + Mitzi Newhouse (small) + Claire Tow (rooftop). Major productions including Complicité collaborations, new American and international work. Bridge between experimental and commercial." },
  { name: "Signature Theatre", hood: "Hell's Kitchen", cat: "broadway", lat: 40.7617, lng: -73.9937, address: "480 W 42nd St", url: "signaturetheatre.org", notes: "Playwright-centered theater — each season dedicates to a single playwright's body of work (Edward Albee, Sam Shepard, Suzan-Lori Parks, etc.). Three stages. Rigorous and writer-first." },
  { name: "Playwrights Horizons", hood: "Hell's Kitchen", cat: "broadway", lat: 40.7614, lng: -73.9940, address: "416 W 42nd St", url: "playwrightshorizons.org", notes: "Since 1971 — the leading new play development theater. James Lapine, Stephen Sondheim, Wendy Wasserstein, and virtually every major American playwright developed work here. Essential for new writing." },
  { name: "Second Stage Theater", hood: "Hell's Kitchen", cat: "broadway", lat: 40.7596, lng: -73.9921, address: "305 W 43rd St", url: "2st.com", notes: "Exclusively produces American plays and musicals. Broadway house + smaller off-Broadway space. Serious commissioning and development program." },
  { name: "The Majestic Theatre", hood: "Theater District", cat: "broadway", lat: 40.7573, lng: -73.9868, address: "245 W 44th St", url: "broadwayworld.com/venues/Majestic-Theatre", notes: "Home of Phantom of the Opera for 35 years. Study the technical rigging, the chandelier drop, the automation systems — a masterclass in theatrical engineering at commercial scale. Harold Prince's production design thinking." },

  // Performance Art
  { name: "Dixon Place", hood: "Lower East Side", cat: "perf", lat: 40.7208, lng: -73.9942, address: "161A Chrystie St", url: "dixonplace.org", notes: "HOT! Festival Jul 6–25. Long-running home of queer experimental work. Risk-taking at small scale — good for scanning emerging artists." },
  { name: "New York Live Arts", hood: "Chelsea", cat: "perf", lat: 40.7430, lng: -74.0001, address: "219 W 19th St", url: "newyorklivearts.org", notes: "Bill T. Jones/Arnie Zane space. Strong interdisciplinary and dance-based performance. Fellowship and residency program for dance artists." },
  { name: "The Kitchen", hood: "Chelsea", cat: "perf", lat: 40.7465, lng: -74.0070, address: "512 W 19th St", url: "thekitchen.org", notes: "Since 1971 — early home of Laurie Anderson, Philip Glass, Meredith Monk, Trisha Brown. Essential node in the downtown experimental scene. Always programming something interesting." },
  { name: "New York City Center", hood: "Midtown", cat: "perf", lat: 40.7601, lng: -73.9796, address: "131 W 55th St", url: "nycitycenter.org", notes: "Fall for Dance (September) — 5 programs over 10 nights, $30 tickets, major dance companies. Encores! series for rarely produced musicals. Great survey of contemporary dance landscape." },

  // Visual Art / Installation (relevant for projection/tech artists)
  { name: "MoMA PS1", hood: "Long Island City", cat: "visual", lat: 40.7452, lng: -73.9376, address: "22-25 Jackson Ave, Queens", url: "momaps1.org", notes: "MoMA's contemporary branch in Queens — more experimental, installation-heavy, performance-adjacent. Warm Up summer music series. Key space for artists working between visual art and performance." },
  { name: "Pioneer Works", hood: "Red Hook", cat: "visual", lat: 40.6759, lng: -74.0131, address: "159 Pioneer St", url: "pioneerworks.org", notes: "Red Hook arts center in a former ironworks. Massive open space used for large-scale installation, performance, and technology-art crossovers. Residencies for artists and scientists. Summer Sundays events are free and excellent." },
  { name: "Dia Chelsea", hood: "Chelsea", cat: "visual", lat: 40.7484, lng: -74.0059, address: "537 W 22nd St", url: "diaart.org", notes: "Dia Foundation's Chelsea space. Minimalist and conceptual art — Dan Flavin, Donald Judd, Richard Serra. Essential for understanding the visual and spatial language that runs parallel to Theater of Images." },

  // Film
  { name: "Anthology Film Archives", hood: "East Village", cat: "film", lat: 40.7253, lng: -73.9882, address: "32 Second Ave", url: "anthologyfilmarchives.org", notes: "THE avant-garde cinema venue in NYC. Co-founded by Jonas Mekas. Essential Cinema program runs year-round — rotating canonical experimental film: Brakhage, Deren, Snow, Mekas, Warhol. Check calendar weekly." },
  { name: "BAM Rose Cinemas", hood: "Fort Greene", cat: "film", lat: 40.6862, lng: -73.9779, address: "30 Lafayette Ave", url: "bam.org/film", notes: "Brooklyn arthouse + experimental film. Filmmaker Q&As, retrospectives. BAMcinemaFest in June is the best festival for independent and international film in NYC." },
  { name: "Microscope Gallery", hood: "Bushwick", cat: "film", lat: 40.7033, lng: -73.9288, address: "1329 Willoughby Ave", url: "microscopegallery.com", notes: "Specialized in moving image, sound, digital, and performance art. Weekly screenings. Essential for experimental film/video alongside theater research." },

  // Opera / Classical
  { name: "Metropolitan Opera House", hood: "Upper West Side", cat: "opera", lat: 40.7724, lng: -73.9836, address: "30 Lincoln Center Plaza", url: "metopera.org", notes: "Largest opera company in the world. Robert Lepage's Ring Cycle (2010) used massive kinetic stage machinery — a key reference for tech-in-theater at scale. Es Devlin designed sets here. Study the technical infrastructure." },
  { name: "David H. Koch Theater", hood: "Upper West Side", cat: "opera", lat: 40.7720, lng: -73.9831, address: "20 Lincoln Center Plaza", url: "nycballet.com", notes: "NY City Ballet. Balanchine's neoclassical tradition + contemporary choreographers (Justin Peck, Crystal Pite guest works). Important for understanding how classical vocabulary gets reimagined." },
  { name: "Lincoln Center — Alice Tully Hall", hood: "Upper West Side", cat: "opera", lat: 40.7727, lng: -73.9845, address: "1941 Broadway", url: "lincolncenter.org", notes: "White Light Festival (fall) — major international series focused on spiritual and transcendent performance. NY Film Festival (October). Check summer programming for outdoor events." },
  { name: "Carnegie Hall", hood: "Midtown", cat: "opera", lat: 40.7651, lng: -73.9800, address: "881 7th Ave", url: "carnegiehall.org", notes: "Zankel Hall (below) programs contemporary and experimental music alongside the main stage. Important for understanding the continuum from classical to experimental in the concert hall context." },

  // Music/Performance
  { name: "National Sawdust", hood: "Williamsburg", cat: "music", lat: 40.7193, lng: -73.9577, address: "80 N 6th St", url: "nationalsawdust.org", notes: "Experimental music and performance hybrid space in Brooklyn. Intimate, acoustically superb. Artists at the intersection of classical, electronic, and performance. Close to work base." },

  // Archive / Library
  { name: "NYPL Performing Arts Library", hood: "Midtown", cat: "archive", lat: 40.7726, lng: -73.9834, address: "40 Lincoln Center Plaza", url: "nypl.org/locations/lpa", notes: "Foreman production materials, Wilson documentation, PAJ back issues, rare performance recordings and video. Free with library card. Essential for deep research." },
  { name: "Watermill Center", hood: "Long Island", cat: "theater", lat: 40.9093, lng: -72.3540, address: "39 Water Mill Towd Rd", url: "watermillcenter.org", notes: "Robert Wilson's laboratory. Jul 5–Aug 2 summer program — 60–100 international artists in intensive collaboration. First summer post-Wilson, historically significant. Day trip from NYC." },
];

const colors = {
  theater:  "#7c3aed",
  broadway: "#0891b2",
  perf:     "#e11d48",
  visual:   "#a855f7",
  film:     "#059669",
  opera:    "#c2410c",
  music:    "#d97706",
  archive:  "#6b7280",
};

const catName = {
  theater:  "Experimental Theater",
  broadway: "Broadway / Major Stage",
  perf:     "Performance Art",
  visual:   "Visual Art / Installation",
  film:     "Film",
  opera:    "Opera / Classical",
  music:    "Music / Performance",
  archive:  "Archive / Library",
};

const pillBg = {
  theater: "#2d1b69", broadway: "#0c2a33", perf: "#3b0016",
  visual: "#3b1d6e", film: "#052e16", opera: "#3b1005",
  music: "#2d1900", archive: "#1a1a1a"
};
const pillFg = {
  theater: "#c4b5fd", broadway: "#67e8f9", perf: "#fda4af",
  visual: "#d8b4fe", film: "#86efac", opera: "#fb923c",
  music: "#fdba74", archive: "#a1a1aa"
};

const markerRefs = [];

// Build sidebar list
const list = document.getElementById('venue-list');
venues.forEach((v, i) => {
  const el = document.createElement('div');
  el.className = 'venue-item';
  el.id = `vi-${i}`;
  el.innerHTML = `<div class="vdot" style="background:${colors[v.cat]}"></div><div><div class="vname">${v.name}</div><div class="vhood">${v.hood}</div></div>`;
  el.onclick = () => {
    document.querySelectorAll('.venue-item').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    map.setView([v.lat, v.lng], 15, { animate: true });
    markerRefs[i].openPopup();
    openCard(v);
  };
  list.appendChild(el);
});

// Build map markers
venues.forEach((v, i) => {
  const color = colors[v.cat];
  const icon = L.divIcon({
    className: '',
    html: `<div style="width:11px;height:11px;border-radius:50%;background:${color};border:2px solid rgba(255,255,255,0.2);box-shadow:0 0 7px ${color}99;"></div>`,
    iconSize: [11, 11], iconAnchor: [5, 5]
  });
  const popup = `
    <h3>${v.name}</h3>
    <div class="hood">${v.hood} · ${v.address}</div>
    <span class="cat-pill" style="background:${pillBg[v.cat]};color:${pillFg[v.cat]}">${catName[v.cat]}</span>
  `;
  const m = L.marker([v.lat, v.lng], { icon }).addTo(map).bindPopup(popup, { maxWidth: 240 });
  m.on('click', () => {
    document.querySelectorAll('.venue-item').forEach(e => e.classList.remove('selected'));
    const el = document.getElementById(`vi-${i}`);
    if (el) { el.classList.add('selected'); el.scrollIntoView({ block: 'nearest' }); }
    openCard(v);
  });
  markerRefs.push(m);
});

// Info card
function openCard(v) {
  document.getElementById('card-cat').textContent = catName[v.cat];
  document.getElementById('card-cat').style.background = pillBg[v.cat];
  document.getElementById('card-cat').style.color = pillFg[v.cat];
  document.getElementById('card-name').textContent = v.name;
  document.getElementById('card-hood').textContent = v.hood + ' · ' + v.address;
  document.getElementById('card-notes').textContent = v.notes;
  document.getElementById('card-link').href = 'https://' + v.url;
  document.getElementById('card').classList.add('open');
}

function closeCard() {
  document.getElementById('card').classList.remove('open');
}
</script>
</body>
</html>
